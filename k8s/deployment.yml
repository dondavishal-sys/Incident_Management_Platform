apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-app-deployment
  labels:
    app: incident-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: incident-app
  template:
    metadata:
      labels:
        app: incident-app
    spec:
      containers:
        - name: incident-app
          image: dondavishal89/incident-management-app:latest
          ports:
            - containerPort: 5000
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10