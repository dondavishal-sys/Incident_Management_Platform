apiVersion: v1
kind: Service
metadata:
  name: incident-app-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "5000"
    prometheus.io/path: "/metrics"
spec:
  type: NodePort
  selector:
    app: incident-app
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30080